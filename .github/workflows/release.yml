name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS Universal (Apple Silicon + Intel)
          - os: macos-latest
            target: universal
            artifact: americano-macos-universal
            binary: americano

          # Linux (static musl builds - no glibc dependency)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: americano-linux-x86_64
            binary: americano

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: americano-linux-aarch64
            binary: americano

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: americano-windows-x86_64
            binary: americano.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target != 'universal' && matrix.target || '' }}

      - name: Install musl tools (Linux only)
        if: contains(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build macOS Universal Binary
        if: matrix.target == 'universal'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create -output ${{ matrix.binary }} \
            target/aarch64-apple-darwin/release/americano \
            target/x86_64-apple-darwin/release/americano

      - name: Build for other platforms
        if: matrix.target != 'universal'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.target }}" == "universal" ]]; then
            cp ${{ matrix.binary }} artifacts/
          else
            cp target/${{ matrix.target }}/release/${{ matrix.binary }} artifacts/
          fi
          cd artifacts
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            zip -9 ../${{ matrix.artifact }}.zip ${{ matrix.binary }}
          else
            tar -czf ../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
          fi

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}